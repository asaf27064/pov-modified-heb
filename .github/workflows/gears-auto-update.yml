name: Gears Auto-Update Check

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    env:
      MY_VERSION_FILE: "gears_version.json"
      BASELINE_DIR: "gears_baseline"

    steps:
      - uses: actions/checkout@v5

      - name: Get versions
        id: versions
        run: |
          ADDONS_XML_URL="https://raw.githubusercontent.com/unhingedthemes/zips/main/_zips/addons.xml"
          ZIP_BASE="https://raw.githubusercontent.com/unhingedthemes/zips/main/_zips/plugin.video.gears"

          UPSTREAM=$(curl -fsSL "$ADDONS_XML_URL" 2>/dev/null \
            | python3 -c "import sys, re; m = re.search(r'<addon[^>]*id=\"plugin\.video\.gears\"[^>]*version=\"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')" \
            | tr -d '\n\r ')

          if [ -z "$UPSTREAM" ]; then
            echo "Upstream lookup failed"
            echo "upstream_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "zip_base=$ZIP_BASE" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"

          COMPAT=$(python3 -c "import json; print(json.load(open('$MY_VERSION_FILE')).get('compatible_gears','0'))")
          echo "compatible=$COMPAT" >> "$GITHUB_OUTPUT"
          echo "Upstream: $UPSTREAM | Compatible: $COMPAT"

          if [ "$UPSTREAM" = "$COMPAT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      # Diff the NEW upstream against our stored clean baseline (gears_baseline/).
      # Upstream prunes old zips, so we can no longer download the old version to
      # compare -- the baseline is our reliable reference and never 404s.
      - name: Download new and compare to baseline
        if: steps.versions.outputs.up_to_date == 'false' && steps.versions.outputs.upstream_failed != 'true'
        id: compare
        run: |
          set -e
          UPSTREAM="${{ steps.versions.outputs.upstream }}"
          ZIP_BASE="${{ steps.versions.outputs.zip_base }}"
          NEW_URL="$ZIP_BASE/plugin.video.gears-$UPSTREAM.zip"

          echo "Downloading new ($UPSTREAM): $NEW_URL"
          if ! curl -fsSL "$NEW_URL" -o new.zip; then
            echo "new_download_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p new && unzip -q new.zip -d new
          NEW_LIB=$(find new -path "*/resources/lib" -type d | head -1)
          NEW_XML=$(find new -path "*/skins/Default/1080i/settings_manager.xml" | head -1)
          if [ -z "$NEW_LIB" ]; then
            echo "structure_error=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEBREW_FILES=(
            "service.py" "modules/sources.py" "windows/sources.py" "modules/meta_lists.py"
            "caches/settings_cache.py" "apis/tmdb_api.py" "apis/torbox_api.py"
            "indexers/movies.py" "indexers/tvshows.py" "indexers/navigator.py"
          )

          CHANGED_FILES=""
          DIFF_OUTPUT=""
          for f in "${HEBREW_FILES[@]}"; do
            BASE_FILE="$BASELINE_DIR/lib/$f"
            NEW_FILE="$NEW_LIB/$f"
            if [ ! -f "$BASE_FILE" ] && [ ! -f "$NEW_FILE" ]; then continue; fi
            if [ ! -f "$BASE_FILE" ]; then
              CHANGED_FILES="$CHANGED_FILES $f(NO-BASELINE)"
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### $f — no baseline copy\n"; continue
            fi
            if [ ! -f "$NEW_FILE" ]; then
              CHANGED_FILES="$CHANGED_FILES $f(REMOVED)"
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### $f — REMOVED upstream\n"; continue
            fi
            if ! diff -q "$BASE_FILE" "$NEW_FILE" > /dev/null 2>&1; then
              CHANGED_FILES="$CHANGED_FILES $f"
              DIFF_CONTENT=$(diff -u "$BASE_FILE" "$NEW_FILE" | head -80)
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### $f\n\`\`\`diff\n$DIFF_CONTENT\n\`\`\`\n"
            fi
          done

          BASE_XML="$BASELINE_DIR/settings_manager.xml"
          if [ -f "$BASE_XML" ] && [ -n "$NEW_XML" ] && [ -f "$NEW_XML" ]; then
            if ! diff -q "$BASE_XML" "$NEW_XML" > /dev/null 2>&1; then
              CHANGED_FILES="$CHANGED_FILES settings_manager.xml"
              DIFF_CONTENT=$(diff -u "$BASE_XML" "$NEW_XML" | head -80)
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### settings_manager.xml\n\`\`\`diff\n$DIFF_CONTENT\n\`\`\`\n"
            fi
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
            printf "%b" "$DIFF_OUTPUT" > /tmp/diff_output.md
          fi

      # Safe (no watched files changed): bump compatible_gears AND advance the
      # baseline marker (the watched files are identical, so the baseline still
      # represents the new version).
      - name: Auto-bump compatible_gears
        if: steps.versions.outputs.up_to_date == 'false' && steps.compare.outputs.safe == 'true' && steps.versions.outputs.upstream_failed != 'true'
        run: |
          UPSTREAM="${{ steps.versions.outputs.upstream }}"
          python3 -c "
          import json
          data = json.load(open('$MY_VERSION_FILE'))
          data['compatible_gears'] = '$UPSTREAM'
          json.dump(data, open('$MY_VERSION_FILE', 'w'), indent=4)
          "
          echo "$UPSTREAM" > "$BASELINE_DIR/BASELINE_VERSION.txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MY_VERSION_FILE" "$BASELINE_DIR/BASELINE_VERSION.txt"
          git commit -m "Auto: Hebrew compatible with Gears $UPSTREAM (watched files unchanged)"
          git push

      # Watched files changed -> manual re-patch needed: open an issue with diffs.
      - name: Open issue for manual review
        if: steps.versions.outputs.up_to_date == 'false' && steps.compare.outputs.safe == 'false'
        uses: actions/github-script@v7
        env:
          UPSTREAM: ${{ steps.versions.outputs.upstream }}
          ZIP_BASE: ${{ steps.versions.outputs.zip_base }}
        with:
          script: |
            const fs = require('fs');
            let diffContent = '';
            try { diffContent = fs.readFileSync('/tmp/diff_output.md', 'utf8'); } catch(e) { diffContent = 'Could not read diff'; }
            const upstream = process.env.UPSTREAM;
            const compatible = '${{ steps.versions.outputs.compatible }}';
            const zipUrl = `${process.env.ZIP_BASE}/plugin.video.gears-${upstream}.zip`;
            // Avoid duplicate issues for the same upstream version.
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'upstream-update' });
            if (existing.data.some(i => i.title.includes(upstream))) { console.log('Issue already open for ' + upstream); return; }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Gears ${upstream} — Hebrew files need updating`,
              body: `## Gears Update Requires Manual Review\n\n**Upstream:** ${upstream}\n**Current compatible:** ${compatible}\n\n**Changed files:** ${('${{ steps.compare.outputs.changed_files }}')}\n\n### Steps:\n1. Download: ${zipUrl}\n2. Use masterkodi-il-builder skill in Claude (hebrew-mod workflow)\n3. Re-apply Hebrew patches onto the new files, test, push\n4. Refresh gears_baseline/ from clean ${upstream}, set compatible_gears=${upstream}\n5. Close this issue\n\n### Diffs (baseline vs ${upstream}):\n${diffContent}`,
              labels: ['upstream-update', 'manual-review']
            });

      # If we couldn't even download the new upstream zip, DON'T fail silently --
      # tell the maintainer so they can check what changed upstream.
      - name: Open issue on download failure
        if: steps.versions.outputs.up_to_date == 'false' && steps.compare.outputs.new_download_failed == 'true'
        uses: actions/github-script@v7
        env:
          UPSTREAM: ${{ steps.versions.outputs.upstream }}
        with:
          script: |
            const upstream = process.env.UPSTREAM;
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'upstream-update' });
            if (existing.data.some(i => i.title.includes(upstream))) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Gears ${upstream} — could not download for comparison`,
              body: `Upstream Gears is ${upstream} but the workflow could not download its zip to compare. Please check the upstream zip path and review manually.`,
              labels: ['upstream-update', 'manual-review']
            });

      - name: Summary
        run: |
          if [ "${{ steps.versions.outputs.up_to_date }}" = "true" ]; then
            echo "## Up to date (${{ steps.versions.outputs.compatible }})" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.compare.outputs.safe }}" = "true" ]; then
            echo "## Auto-bumped: ${{ steps.versions.outputs.compatible }} -> ${{ steps.versions.outputs.upstream }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.compare.outputs.new_download_failed }}" = "true" ]; then
            echo "## Download failed for ${{ steps.versions.outputs.upstream }} - issue opened" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Manual review: ${{ steps.versions.outputs.compatible }} -> ${{ steps.versions.outputs.upstream }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Changed: ${{ steps.compare.outputs.changed_files }}" >> "$GITHUB_STEP_SUMMARY"
          fi

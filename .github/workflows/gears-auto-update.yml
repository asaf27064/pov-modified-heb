name: Gears Auto-Update Check

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    env:
      MY_VERSION_FILE: "gears_version.json"

    steps:
      - uses: actions/checkout@v5

      - name: Get versions
        id: versions
        run: |
          # Upstream source: chainsrepo addons.xml (https://unhingedthemes.github.io)
          ADDONS_XML_URL="https://raw.githubusercontent.com/unhingedthemes/zips/main/_zips/addons.xml"
          ZIP_BASE="https://raw.githubusercontent.com/unhingedthemes/zips/main/_zips/plugin.video.gears"

          UPSTREAM=$(curl -fsSL "$ADDONS_XML_URL" 2>/dev/null \
            | python3 -c "import sys, re; m = re.search(r'<addon[^>]*id=\"plugin\.video\.gears\"[^>]*version=\"([^\"]+)\"', sys.stdin.read()); print(m.group(1) if m else '')" \
            | tr -d '\n\r ')

          if [ -z "$UPSTREAM" ]; then
            echo "Upstream lookup failed"
            echo "upstream_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "source=chainsrepo" >> "$GITHUB_OUTPUT"
          echo "zip_base=$ZIP_BASE" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"

          COMPAT=$(python3 -c "import json; print(json.load(open('$MY_VERSION_FILE')).get('compatible_gears','0'))")
          echo "compatible=$COMPAT" >> "$GITHUB_OUTPUT"

          echo "Upstream: $UPSTREAM | Compatible: $COMPAT"

          if [ "$UPSTREAM" = "$COMPAT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and compare
        if: steps.versions.outputs.up_to_date == 'false' && steps.versions.outputs.upstream_failed != 'true'
        id: compare
        run: |
          set -e
          UPSTREAM="${{ steps.versions.outputs.upstream }}"
          COMPAT="${{ steps.versions.outputs.compatible }}"
          ZIP_BASE="${{ steps.versions.outputs.zip_base }}"

          OLD_URL="$ZIP_BASE/plugin.video.gears-$COMPAT.zip"
          NEW_URL="$ZIP_BASE/plugin.video.gears-$UPSTREAM.zip"

          echo "Downloading old ($COMPAT): $OLD_URL"
          curl -fsSL "$OLD_URL" -o old.zip || { echo "old_download_failed=true" >> "$GITHUB_OUTPUT"; exit 0; }

          echo "Downloading new ($UPSTREAM): $NEW_URL"
          curl -fsSL "$NEW_URL" -o new.zip || { echo "new_download_failed=true" >> "$GITHUB_OUTPUT"; exit 0; }

          mkdir -p old new
          unzip -q old.zip -d old
          unzip -q new.zip -d new

          OLD_LIB=$(find old -path "*/resources/lib" -type d | head -1)
          NEW_LIB=$(find new -path "*/resources/lib" -type d | head -1)

          if [ -z "$OLD_LIB" ] || [ -z "$NEW_LIB" ]; then
            echo "Could not find resources/lib in ZIPs"
            echo "structure_error=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Files we actually overlay/inject Hebrew code into for Gears.
          # KEEP IN SYNC with REQUIRED_FILES in ~/.claude/skills/masterkodi-il-builder/scripts/rebuild_hebrew_zip.py
          # If upstream changes any of these, the workflow opens a manual-review issue with the diff.
          HEBREW_FILES=(
            "modules/sources.py"
            "windows/sources.py"
            "caches/settings_cache.py"
            "apis/tmdb_api.py"
            "apis/torbox_api.py"
            "indexers/movies.py"
            "indexers/tvshows.py"
          )

          # Also watch the settings_manager.xml in skins/Default/1080i
          XML_REL="../skins/Default/1080i/settings_manager.xml"

          CHANGED_FILES=""
          DIFF_OUTPUT=""

          for f in "${HEBREW_FILES[@]}"; do
            OLD_FILE="$OLD_LIB/$f"
            NEW_FILE="$NEW_LIB/$f"

            if [ ! -f "$OLD_FILE" ] && [ ! -f "$NEW_FILE" ]; then
              continue
            fi

            if [ ! -f "$OLD_FILE" ]; then
              CHANGED_FILES="$CHANGED_FILES $f(NEW)"
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### $f â€” NEW FILE\n"
              continue
            fi

            if [ ! -f "$NEW_FILE" ]; then
              CHANGED_FILES="$CHANGED_FILES $f(REMOVED)"
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### $f â€” REMOVED\n"
              continue
            fi

            if ! diff -q "$OLD_FILE" "$NEW_FILE" > /dev/null 2>&1; then
              CHANGED_FILES="$CHANGED_FILES $f"
              DIFF_CONTENT=$(diff -u "$OLD_FILE" "$NEW_FILE" | head -80)
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### $f\n\`\`\`diff\n$DIFF_CONTENT\n\`\`\`\n"
            fi
          done

          # Compare settings_manager.xml (separate location)
          OLD_XML="$OLD_LIB/$XML_REL"
          NEW_XML="$NEW_LIB/$XML_REL"
          if [ -f "$OLD_XML" ] && [ -f "$NEW_XML" ]; then
            if ! diff -q "$OLD_XML" "$NEW_XML" > /dev/null 2>&1; then
              CHANGED_FILES="$CHANGED_FILES settings_manager.xml"
              DIFF_CONTENT=$(diff -u "$OLD_XML" "$NEW_XML" | head -80)
              DIFF_OUTPUT="$DIFF_OUTPUT\n\n### settings_manager.xml\n\`\`\`diff\n$DIFF_CONTENT\n\`\`\`\n"
            fi
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
            printf "%b" "$DIFF_OUTPUT" > /tmp/diff_output.md
          fi

      - name: Auto-bump compatible_gears
        if: steps.versions.outputs.up_to_date == 'false' && steps.compare.outputs.safe == 'true' && steps.versions.outputs.upstream_failed != 'true'
        run: |
          UPSTREAM="${{ steps.versions.outputs.upstream }}"
          COMPAT="${{ steps.versions.outputs.compatible }}"

          python3 -c "
          import json
          data = json.load(open('$MY_VERSION_FILE'))
          data['compatible_gears'] = '$UPSTREAM'
          json.dump(data, open('$MY_VERSION_FILE', 'w'), indent=4)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MY_VERSION_FILE"
          git commit -m "Auto: Hebrew compatible with Gears $UPSTREAM (no file changes)"
          git push

      - name: Open issue for manual review
        if: steps.versions.outputs.up_to_date == 'false' && steps.compare.outputs.safe == 'false'
        uses: actions/github-script@v7
        env:
          UPSTREAM: ${{ steps.versions.outputs.upstream }}
          ZIP_BASE: ${{ steps.versions.outputs.zip_base }}
        with:
          script: |
            const fs = require('fs');
            let diffContent = '';
            try { diffContent = fs.readFileSync('/tmp/diff_output.md', 'utf8'); } catch(e) { diffContent = 'Could not read diff'; }

            const upstream = process.env.UPSTREAM;
            const compatible = '${{ steps.versions.outputs.compatible }}';
            const zipUrl = `${process.env.ZIP_BASE}/plugin.video.gears-${upstream}.zip`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Gears ${upstream} â€” Hebrew files need updating`,
              body: `## Gears Update Requires Manual Review\n\n**Upstream:** ${upstream}\n**Current compatible:** ${compatible}\n\n**Changed files:** ${('${{ steps.compare.outputs.changed_files }}')}\n\n### Steps:\n1. Download: ${zipUrl}\n2. Use FenLight Hebrew Mod Updater skill in Claude\n3. Update Hebrew files, test, push\n4. Update compatible_gears to ${upstream}\n5. Close this issue\n\n### Diffs:\n${diffContent}`,
              labels: ['upstream-update', 'manual-review']
            });

      - name: Summary
        run: |
          if [ "${{ steps.versions.outputs.up_to_date }}" = "true" ]; then
            echo "## âś… Up to date (${{ steps.versions.outputs.compatible }})" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.compare.outputs.safe }}" = "true" ]; then
            echo "## âś… Auto-bumped: ${{ steps.versions.outputs.compatible }} â†’ ${{ steps.versions.outputs.upstream }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## âš ď¸Ź Manual review: ${{ steps.versions.outputs.compatible }} â†’ ${{ steps.versions.outputs.upstream }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Changed: ${{ steps.compare.outputs.changed_files }}" >> "$GITHUB_STEP_SUMMARY"
          fi
